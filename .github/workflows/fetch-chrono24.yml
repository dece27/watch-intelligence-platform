name: Fetch Chrono24 Listings

on:
  schedule:
    # Run every 6 hours — respectful cadence for a scraper
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      github_environment:
        description: 'GitHub Environment with SUPABASE_URL (variable) and SUPABASE_SERVICE_ROLE_KEY (secret)'
        required: false
        default: production

jobs:
  fetch:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.github_environment || vars.CHRONO24_GITHUB_ENVIRONMENT || 'production' }}
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHRONO24_ACCESS_APPROVED: ${{ vars.CHRONO24_ACCESS_APPROVED || 'false' }}
      CHRONO24_UPSTREAM_FAILURE_THRESHOLD: ${{ vars.CHRONO24_UPSTREAM_FAILURE_THRESHOLD || '4' }}
      CHRONO24_STALE_AFTER_HOURS: ${{ vars.CHRONO24_STALE_AFTER_HOURS || '48' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-chrono24.txt

      - name: Set metrics path
        run: |
          echo "CHRONO24_SYNC_METRICS_PATH=${RUNNER_TEMP}/chrono24-sync-metrics.json" >> "$GITHUB_ENV"
          echo "CHRONO24_PLAYWRIGHT_DEBUG_DIR=${RUNNER_TEMP}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r scripts/requirements-chrono24.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('scripts/requirements-chrono24.txt') }}

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Fetch listings from Chrono24
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Skipping Chrono24 fetch: configure SUPABASE_URL as an Environment variable and SUPABASE_SERVICE_ROLE_KEY as a secret in the selected GitHub Environment."
            exit 0
          fi
          set +e
          python scripts/fetch-chrono24.py
          fetch_exit_code=$?
          set -e

          if [ "${fetch_exit_code}" -eq 0 ]; then
            exit 0
          fi

          if [ ! -f "${CHRONO24_SYNC_METRICS_PATH}" ]; then
            echo "::error::Chrono24 fetch failed before metrics were written."
            exit "${fetch_exit_code}"
          fi

          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          metrics_path = Path(os.environ["CHRONO24_SYNC_METRICS_PATH"])
          metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
          status = str(metrics.get("status") or "")

          if status == "failed_upsert":
              print(f"::error::Chrono24 fetch failed with fatal status '{status}'.")
              sys.exit(1)

          if status == "mapping_empty":
              print(
                  "::warning::Chrono24 listings were fetched but mapping produced no valid rows. "
                  "Preserving existing cached listings and continuing."
              )
              sys.exit(0)

          if status == "upstream_unavailable":
              consecutive = metrics.get("consecutive_upstream_failures", 0)
              threshold = metrics.get(
                  "upstream_failure_threshold",
                  os.environ.get("CHRONO24_UPSTREAM_FAILURE_THRESHOLD", "n/a"),
              )
              sustained = bool(metrics.get("sustained_upstream_failure", False))
              no_cached = bool(metrics.get("no_cached_listings", False))
              hard_failure = bool(metrics.get("hard_upstream_failure", False))

              if hard_failure or sustained or no_cached:
                  if no_cached:
                      print(
                          "::error::Chrono24 upstream is unavailable and no cached listings "
                          "are available. Failing the workflow because user-facing deals data "
                          "is unavailable."
                      )
                  else:
                      print(
                          "::error::Chrono24 upstream is unavailable and sustained failures "
                          f"reached {consecutive} consecutive runs (threshold {threshold})."
                      )
                  sys.exit(1)

              print(
                  "::warning::Chrono24 upstream is unavailable, but cached listings are still "
                  "protecting the user-facing experience; "
                  f"observability captured {consecutive} consecutive failures "
                  f"(threshold {threshold})."
              )
              sys.exit(0)

          print(
              "::error::Chrono24 fetch exited non-zero with an unexpected status "
              f"'{status or 'unknown'}'."
          )
          sys.exit(1)
          PY

      - name: Chrono24 sync observability summary
        if: always()
        run: |
          if [ ! -f "${CHRONO24_SYNC_METRICS_PATH}" ]; then
            {
              echo "## Chrono24 sync summary"
              echo
              echo "- Metrics file not generated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          metrics_path = Path(os.environ["CHRONO24_SYNC_METRICS_PATH"])
          metrics = json.loads(metrics_path.read_text(encoding="utf-8"))

          def value(name, default="n/a"):
              raw = metrics.get(name, default)
              return default if raw in ("", None) else raw

          lines = [
              "## Chrono24 sync summary",
              "",
              f"- Status: `{value('status')}`",
              f"- Upserted: `{value('upserted', 0)}`",
              f"- Retrieved: `{value('retrieved', 0)}`",
              f"- Request errors: `{value('request_errors', 0)}` / `{value('query_count', 0)}`",
              f"- Request error rate: `{value('request_error_rate', 0)}`",
              f"- Consecutive upstream failures: `{value('consecutive_upstream_failures', 0)}` (threshold `{value('upstream_failure_threshold', os.environ.get('CHRONO24_UPSTREAM_FAILURE_THRESHOLD', 'n/a'))}`)",
              f"- Cached listings stale: `{value('cached_listing_is_stale', True)}` (age hours: `{value('cached_listing_age_hours')}`; stale after `{value('stale_after_hours', os.environ.get('CHRONO24_STALE_AFTER_HOURS', 'n/a'))}`)",
              f"- Cached listing last updated: `{value('cached_listing_last_updated_at')}`",
              f"- No cached listings: `{value('no_cached_listings', False)}`",
              f"- Sustained upstream failure: `{value('sustained_upstream_failure', False)}`",
              f"- Hard upstream failure: `{value('hard_upstream_failure', False)}`",
          ]

          degraded = (
              (
                  str(value("status")) == "upstream_unavailable"
                  and not bool(metrics.get("hard_upstream_failure", False))
              )
              or str(value("status")) == "mapping_empty"
          )
          failed = bool(metrics.get("failed", False))

          if failed:
              lines.extend(
                  [
                      "",
                      "### Outcome",
                      "This run failed because Chrono24 data was not safely available.",
                  ]
              )
          elif degraded:
              if str(value("status")) == "mapping_empty":
                  degraded_outcome = (
                      "This run is green but degraded because Chrono24 listings were fetched "
                      "but could not be mapped into valid rows; cached listings were preserved."
                  )
              else:
                  degraded_outcome = (
                      "This run is green but degraded because Chrono24 was unavailable and "
                      "cached listings were used as fallback."
                  )
              lines.extend(
                  [
                      "",
                      "### Outcome",
                      degraded_outcome,
                  ]
              )
          else:
              lines.extend(
                  [
                      "",
                      "### Outcome",
                      "This run completed without detected Chrono24 availability degradation.",
                  ]
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary_file:
              summary_file.write("\n".join(str(line) for line in lines) + "\n")
          PY

      - name: Upload Chrono24 sync metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrono24-sync-metrics
          path: ${{ env.CHRONO24_SYNC_METRICS_PATH }}
          if-no-files-found: ignore

      - name: Upload Playwright debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-screenshots
          path: ${{ env.CHRONO24_PLAYWRIGHT_DEBUG_DIR }}/chrono24_debug_*.png
          if-no-files-found: ignore

      - name: Report result
        if: failure()
        run: echo "Chrono24 fetch failed — check logs above."
