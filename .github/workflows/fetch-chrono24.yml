name: Fetch Chrono24 Listings

on:
  schedule:
    # Run every 6 hours — respectful cadence for a scraper
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || vars.SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || '' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-chrono24.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-chrono24.txt

      - name: Fetch listings from Chrono24
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: python scripts/fetch-chrono24.py

      - name: Skip fetch when Supabase secrets are missing
        if: ${{ env.SUPABASE_URL == '' || env.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "Skipping Chrono24 fetch: set SUPABASE_URL/NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in repository secrets or variables."

      - name: Report result
        if: failure()
        run: echo "Chrono24 fetch failed — check logs above."
