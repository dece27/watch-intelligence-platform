name: Fetch Chrono24 Listings

on:
  schedule:
    # Run every 6 hours — respectful cadence for a scraper
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-chrono24.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-chrono24.txt

      - name: Fetch listings from Chrono24
        run: python scripts/fetch-chrono24.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report result
        if: failure()
        run: echo "Chrono24 fetch failed — check logs above."
