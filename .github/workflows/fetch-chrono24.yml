name: Fetch Chrono24 Listings

on:
  schedule:
    # Run every 6 hours — respectful cadence for a scraper
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      github_environment:
        description: 'GitHub Environment with SUPABASE_URL (variable) and SUPABASE_SERVICE_ROLE_KEY (secret)'
        required: false
        default: production

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.github_environment || vars.CHRONO24_GITHUB_ENVIRONMENT || 'production' }}
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-chrono24.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-chrono24.txt

      - name: Fetch listings from Chrono24
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Skipping Chrono24 fetch: configure SUPABASE_URL as an Environment variable and SUPABASE_SERVICE_ROLE_KEY as a secret in the selected GitHub Environment."
            exit 0
          fi
          python scripts/fetch-chrono24.py

      - name: Report result
        if: failure()
        run: echo "Chrono24 fetch failed — check logs above."
