name: "Copilot Setup Steps"

# Run automatically when this file changes (for validation) and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job name MUST be `copilot-setup-steps` to be picked up by the Copilot cloud agent.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=2 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      # ── Node.js / npm ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci
