name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Create production env file
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL secret is not set in repository secrets}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY secret is not set in repository secrets}"
          {
            printf 'VITE_SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
          } > "$GITHUB_WORKSPACE/.env.production"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build static export
        run: |
          npm run build
          mkdir -p out
          cp -R dist/. out/
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          GITHUB_REPOSITORY: ${{ github.repository }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
