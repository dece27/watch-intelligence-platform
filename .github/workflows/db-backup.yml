name: Daily Supabase DB Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
      RCLONE_CONFIG_R2_ENDPOINT: https://${{ vars.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_REMOTE_PATH: r2:${{ vars.CLOUDFLARE_R2_BUCKET }}/supabase-db
      BACKUP_ALERT_EMAIL_TO: ${{ vars.BACKUP_ALERT_EMAIL_TO }}
      BACKUP_ALERT_EMAIL_FROM: ${{ vars.BACKUP_ALERT_EMAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate backup configuration
        id: preflight
        env:
          # Note: SUPABASE_DB_URL uses port 5432 — only works if Supabase network
          # restrictions allow the runner IP. For migrations use
          # SUPABASE_ACCESS_TOKEN + supabase link instead.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ vars.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
        run: |
          missing=()
          # Note: SUPABASE_DB_URL uses port 5432 — only works if Supabase network restrictions allow the runner IP.
          # For migrations use SUPABASE_ACCESS_TOKEN + supabase link instead.
          [ -n "${SUPABASE_DB_URL:-}" ] || missing+=("SUPABASE_DB_URL secret")
          [ -n "${CLOUDFLARE_R2_ACCESS_KEY:-}" ] || missing+=("CLOUDFLARE_R2_ACCESS_KEY secret")
          [ -n "${CLOUDFLARE_R2_SECRET_KEY:-}" ] || missing+=("CLOUDFLARE_R2_SECRET_KEY secret")
          [ -n "${CLOUDFLARE_R2_ACCOUNT_ID:-}" ] || missing+=("CLOUDFLARE_R2_ACCOUNT_ID variable")
          [ -n "${CLOUDFLARE_R2_BUCKET:-}" ] || missing+=("CLOUDFLARE_R2_BUCKET variable")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::warning::Skipping backup because required configuration is missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        if: steps.preflight.outputs.configured == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install rclone
        if: steps.preflight.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Prefer IPv4 for Supabase host
        if: steps.preflight.outputs.configured == 'true'
        env:
          # Note: SUPABASE_DB_URL uses port 5432 — only works if Supabase network
          # restrictions allow the runner IP. For migrations use
          # SUPABASE_ACCESS_TOKEN + supabase link instead.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python - <<'PY'
          import os
          import socket
          from urllib.parse import urlparse

          host = urlparse(os.environ["SUPABASE_DB_URL"]).hostname
          if not host:
              print("::error::Could not parse the hostname from SUPABASE_DB_URL.")
              raise SystemExit(1)

          try:
              ipv4_addresses = sorted(
                  {info[4][0] for info in socket.getaddrinfo(host, None, socket.AF_INET, socket.SOCK_STREAM)}
              )
          except socket.gaierror:
              ipv4_addresses = []

          if not ipv4_addresses:
              print(f"::warning::No IPv4 address found for {host}; using the default DNS resolution.")
              raise SystemExit(0)

          ipv4 = ipv4_addresses[0]
          print(f"Pinning {host} to IPv4 {ipv4} for this job.")
          with open("/tmp/supabase-host-entry", "w", encoding="utf-8") as file:
              file.write(f"{ipv4} {host}\n")
          PY

          if [ -f /tmp/supabase-host-entry ]; then
            sudo tee -a /etc/hosts < /tmp/supabase-host-entry >/dev/null
          fi

      - name: Dump database backup
        if: steps.preflight.outputs.configured == 'true'
        env:
          # Note: SUPABASE_DB_URL uses port 5432 — only works if Supabase network
          # restrictions allow the runner IP. For migrations use
          # SUPABASE_ACCESS_TOKEN + supabase link instead.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          BACKUP_DATE="$(date -u +%Y%m%d)"
          BACKUP_FILE="backup_${BACKUP_DATE}.sql"
          # Note: SUPABASE_DB_URL uses port 5432 — only works if Supabase network restrictions allow the runner IP.
          # For migrations use SUPABASE_ACCESS_TOKEN + supabase link instead.
          supabase db dump --db-url "$SUPABASE_DB_URL" > "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"

      - name: Gzip backup file
        if: steps.preflight.outputs.configured == 'true'
        run: |
          gzip -f "$BACKUP_FILE"
          echo "BACKUP_ARCHIVE=${BACKUP_FILE}.gz" >> "$GITHUB_ENV"

      - name: Upload backup to Cloudflare R2
        if: steps.preflight.outputs.configured == 'true'
        run: |
          rclone copy "$BACKUP_ARCHIVE" "$R2_REMOTE_PATH/" --immutable

      - name: Delete R2 backups older than 30 days
        if: steps.preflight.outputs.configured == 'true'
        run: |
          rclone delete "$R2_REMOTE_PATH/" --min-age 30d
          rclone rmdirs "$R2_REMOTE_PATH/" --leave-root

      - name: Send failure alert via Resend
        if: ${{ failure() && steps.preflight.outputs.configured == 'true' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          FROM_EMAIL="${BACKUP_ALERT_EMAIL_FROM:-onboarding@resend.dev}"
          TO_EMAIL="${BACKUP_ALERT_EMAIL_TO:-}"

          if [ -z "$RESEND_API_KEY" ] || [ -z "$TO_EMAIL" ]; then
            echo "Skipping failure alert because RESEND_API_KEY or BACKUP_ALERT_EMAIL_TO is not configured."
            exit 0
          fi

          curl --fail-with-body --silent --show-error \
            -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "from": "$FROM_EMAIL",
            "to": ["$TO_EMAIL"],
            "subject": "Daily Supabase backup failed: ${{ github.repository }}",
            "html": "<p>The scheduled database backup workflow failed.</p><p><strong>Repository:</strong> ${{ github.repository }}</p><p><strong>Run:</strong> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View workflow run</a></p>"
          }
          EOF
